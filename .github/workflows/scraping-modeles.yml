name: Scraping Aramisauto - Detail par modele

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape-modeles:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dependances
        run: |
          pip install -r requirements-scraping.txt
          playwright install --with-deps chromium

      - name: Lancer le scraping detaille par modele
        run: python scraper_modeles.py

      - name: Pousser les donnees mises a jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/historique_modeles.csv
          git diff --cached --quiet && echo "Aucun changement." || (git commit -m "Mise a jour auto detail modeles" && git pull --rebase origin main && git push)
